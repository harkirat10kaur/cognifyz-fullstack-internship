<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBoard - Developer Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>🛠️ DevBoard</h1>
      <p>Your Developer Task Manager</p>
    </div>
    <div class="header-right">
      <div class="stats">
        <div class="stat">
          <span id="total-count">0</span>
          <p>Total</p>
        </div>
        <div class="stat">
          <span id="done-count">0</span>
          <p>Done</p>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <section class="form-section">
      <h2>Add New Task</h2>
      <input type="text" id="title" placeholder="Task title" required>
      <textarea id="description" placeholder="Description (optional)"></textarea>
      <select id="priority">
        <option value="low">Low Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="high">High Priority</option>
      </select>
      <button class="primary" onclick="addTask()">+ Add Task</button>
    </section>

    <section class="tasks-section">
      <h2>Your Tasks</h2>
      <div id="tasks-container"></div>
    </section>
  </main>

  <!-- GitHub Stats Section -->
<section class="github-section">
  <div class="github-header">
    <h2>GitHub Stats</h2>
    <div class="github-search">
      <input type="text" id="github-username" placeholder="Enter GitHub username">
      <button class="primary" type="button" onclick="fetchGithub()">Fetch Stats</button>
    </div>
  </div>
  <div id="github-container">
    <p class="github-placeholder">Enter a GitHub username to see their stats</p>
  </div>
</section>

  <script src="app.js"></script>
</body>
</html>
