<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBoard - Login</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <h1>🛠️ DevBoard</h1>
      <p>Your Developer Task Manager</p>
    </div>

    <a href="landing.html" class="back-home">← Back to home</a>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <h2>Welcome back</h2>
        <input type="email" id="login-email" placeholder="Email address">
        <input type="password" id="login-password" placeholder="Password">
        <button class="primary" onclick="login()">Login</button>
        <p id="login-error" class="error-msg"></p>
      </div>

      <!-- Register Form -->
      <div id="register-form" style="display:none">
        <h2>Create account</h2>
        <input type="text" id="reg-name" placeholder="Full name">
        <input type="email" id="reg-email" placeholder="Email address">
        <input type="password" id="reg-password" placeholder="Password (min 6 characters)">
        <button class="primary" onclick="register()">Create Account</button>
        <p id="reg-error" class="error-msg"></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
